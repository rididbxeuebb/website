name: blog

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt
        required: false

  schedule:
    - cron: '0 0 * * *'

jobs:
  generate:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Setup OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run OpenCode
        env:
          PROMPT: ${{ inputs.prompt || 'No additional instructions.' }}
        run: opencode run "$PROMPT"

      - name: Run oxfmt
        run: npx oxfmt .
        continue-on-error: true

      - name: Push
        env:
          GIT_AUTHOR_NAME: opencode-agent[bot]
          GIT_AUTHOR_EMAIL: 219766164+opencode-agent[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: opencode-agent[bot]
          GIT_COMMITTER_EMAIL: 219766164+opencode-agent[bot]@users.noreply.github.com
        run: |
          git add content/posts/
          git diff --cached --quiet && exit 0
          git commit -m "Add generated blog post"
          git push
