name: blog

on:
   workflow_dispatch:
      inputs:
         prompt:
            description: Prompt
            required: false

   schedule:
      - cron: '0 0 * * *'

jobs:
   generate:
      timeout-minutes: 10
      runs-on: ubuntu-latest

      permissions:
         id-token: write
         contents: write
         pull-requests: write
         issues: write

      env:
         TZ: UTC

      steps:
         - name: Checkout repository
           uses: actions/checkout@v6
           with:
              ref: ${{ github.ref_name }}
              fetch-depth: 0

         - name: Setup Hugo
           uses: peaceiris/actions-hugo@v3
           with:
              hugo-version: 'latest'

         - name: Setup OpenCode
           run: curl -fsSL https://opencode.ai/install | bash

         - name: Setup Deno
           uses: denoland/setup-deno@v2

         - name: Restore OpenCode auth
           shell: bash
           env:
              OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
           run: |
              set -euo pipefail
              dir="${XDG_DATA_HOME:-$HOME/.local/share}/opencode"
              mkdir -p "$dir"
              printf '%s' "$OPENCODE_AUTH_JSON_B64" | base64 -d > "$dir/auth.json"
              chmod 600 "$dir/auth.json"

         - name: Run OpenCode
           shell: bash
           env:
              OPENCODE_ENABLE_EXA: 1
              PROMPT: ${{ inputs.prompt || 'No additional instructions.' }}
           run: |
              set -euo pipefail
              if ! printf '%s\n' "$PROMPT" | opencode run --model openai/gpt-5.4-mini --variant high; then
                 printf 'OpenAI model failed, falling back to opencode/minimax-m2.5-free\n' >&2
                 printf '%s\n' "$PROMPT" | opencode run --model opencode/minimax-m2.5-free
              fi

         - name: Refresh OpenCode auth secret
           if: success()
           shell: bash
           env:
              GH_TOKEN: ${{ secrets.MY_GH_TOKEN }}
           run: |
              set -euo pipefail
              file="${XDG_DATA_HOME:-$HOME/.local/share}/opencode/auth.json"
              gh secret set OPENCODE_AUTH_JSON_B64 --body "$(base64 -w 0 < "$file")"

         - name: Run deno fmt
           run: deno fmt --no-config --ignore=**/*.html --indent-width 3 --line-width 69420 --prose-wrap preserve --single-quote true .
           continue-on-error: true

         - name: Push
           shell: bash
           env:
              GIT_AUTHOR_NAME: opencode-agent[bot]
              GIT_AUTHOR_EMAIL: 219766164+opencode-agent[bot]@users.noreply.github.com
              GIT_COMMITTER_NAME: opencode-agent[bot]
              GIT_COMMITTER_EMAIL: 219766164+opencode-agent[bot]@users.noreply.github.com
              GH_TOKEN: ${{ secrets.MY_GH_TOKEN }}
           run: |
              set -euo pipefail

              git pull --rebase origin "${{ github.ref_name }}"

              git add content/posts/

              if git diff --cached --quiet; then
                 exit 1
              fi

              LATEST_POST=$(git diff --cached --name-only --diff-filter=A -- 'content/posts/*.md' | head -n 1 || true)

              git commit -m "Add generated blog post"
              git push origin HEAD:${{ github.ref_name }}

              if [ -n "$LATEST_POST" ]; then
                 SLUG=$(basename "$LATEST_POST" .md)
                 URL="https://rididbxeuebb.pages.dev/posts/$SLUG/"
                 gh issue create --repo octocat/Hello-World --title "🚨 New article published 😫" --body "A new article has been published: $URL"
              fi
